<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maliban Packing Spec Finder</title>
</head>
<body>
  <div class="topbar">
    <div class="wrap" style="padding-top:0;padding-bottom:0;">
      <div class="kicker">Maliban Biscuit &middot; QA R&amp;D</div>
      <h1>Packing Spec Finder</h1>
      <div class="doc">Slug, gauge, wrapper, print &amp; carton specs</div>
    </div>
  </div>
  <div class="wrap">
    <div class="search-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="search" type="text" placeholder="Search biscuit name..." autocomplete="off">
    </div>
    <div class="field-group">
      <label class="field" for="product">Product</label>
      <select id="product"></select>
    </div>
    <div class="field-group" id="weight-group" style="display:none;">
      <label class="field" for="weight">Pack size / weight</label>
      <select id="weight"></select>
    </div>
    <div class="result" id="result">
      <div class="empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        <p>Pick a biscuit to see its packing parameters.</p>
      </div>
    </div>
    <div class="count" id="count"></div>
    <div class="foot">Offline reference &middot; works on phone &amp; PC</div>
  </div>
</body>
</html>
